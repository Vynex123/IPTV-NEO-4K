<!-- في نهاية BODY، أضف هذا قبل </body> -->

<!-- Admin Login Overlay -->
<div class="admin-login-overlay" id="adminLoginOverlay">
  <div class="admin-box">
    <h2>🔐 Admin Access</h2>
    <p>Enter your admin code to access the dashboard</p>
    <input type="password" class="admin-code-input" id="adminCodeInput" placeholder="••••••••" maxlength="10">
    <button class="admin-btn" onclick="checkAdminCode()">Access Dashboard</button>
    <div class="admin-error" id="adminError">Invalid code!</div>
  </div>
</div>

<!-- Admin Panel Overlay -->
<div class="admin-panel-overlay" id="adminPanelOverlay">
  <div class="admin-header">
    <div class="admin-title">📊 VYNEX Admin Dashboard</div>
    <button class="admin-close" onclick="closeAdminPanel()"><i class="fas fa-times"></i></button>
  </div>
  <div class="admin-container">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="statNew">0</div>
        <div class="stat-label">New Orders</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statProgress">0</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statCompleted">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statTotal">0</div>
        <div class="stat-label">Total Orders</div>
      </div>
    </div>
    
    <!-- Search -->
    <input type="text" class="order-search" id="orderSearch" placeholder="🔍 Search by ticket number..." onkeyup="searchOrders()">
    
    <!-- Tabs -->
    <div class="admin-tabs">
      <div class="admin-tab active" onclick="filterOrders('all')">All <span class="count" id="tabAll">0</span></div>
      <div class="admin-tab" onclick="filterOrders('new')">🔴 New <span class="count" id="tabNew">0</span></div>
      <div class="admin-tab" onclick="filterOrders('progress')">🟡 In Progress <span class="count" id="tabProgress">0</span></div>
      <div class="admin-tab" onclick="filterOrders('completed')">🟢 Completed <span class="count" id="tabCompleted">0</span></div>
    </div>
    
    <!-- Orders Grid -->
    <div class="orders-grid" id="ordersGrid">
      <!-- Orders will be loaded here -->
    </div>
  </div>
</div>

<script>
// ============================================
// ADMIN PANEL SYSTEM
// ============================================

let logoClickCount = 0;
let logoClickTimer = null;
const ADMIN_CODE = 'vynex123#';
const WHATSAPP_NUMBER = '213672261893';

// Logo click handler (5 clicks to open admin)
document.getElementById('logo').addEventListener('click', function(e) {
  // Don't trigger if clicking on modal or other elements
  if (e.target.closest('.modal-overlay') || e.target.closest('.admin-panel-overlay')) return;
  
  logoClickCount++;
  
  if (logoClickCount === 1) {
    logoClickTimer = setTimeout(() => {
      logoClickCount = 0;
    }, 3000);
  }
  
  if (logoClickCount >= 5) {
    clearTimeout(logoClickTimer);
    logoClickCount = 0;
    openAdminLogin();
  }
});

function openAdminLogin() {
  document.getElementById('adminLoginOverlay').classList.add('open');
  document.getElementById('adminCodeInput').value = '';
  document.getElementById('adminCodeInput').focus();
  document.getElementById('adminError').style.display = 'none';
}

function checkAdminCode() {
  const input = document.getElementById('adminCodeInput').value;
  if (input === ADMIN_CODE) {
    document.getElementById('adminLoginOverlay').classList.remove('open');
    openAdminPanel();
  } else {
    document.getElementById('adminError').style.display = 'block';
  }
}

// Close admin login on overlay click
document.getElementById('adminLoginOverlay').addEventListener('click', function(e) {
  if (e.target === this) {
    this.classList.remove('open');
  }
});

// Enter key on admin code input
document.getElementById('adminCodeInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') checkAdminCode();
});

function openAdminPanel() {
  document.getElementById('adminPanelOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  loadOrders();
}

function closeAdminPanel() {
  document.getElementById('adminPanelOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Order Management System
let orders = JSON.parse(localStorage.getItem('vynex_orders') || '[]');
let currentFilter = 'all';

function generateTicketNumber() {
  const prefix = 'VNX';
  const timestamp = Date.now().toString(36).toUpperCase();
  const random = Math.random().toString(36).substring(2, 5).toUpperCase();
  return `${prefix}-${timestamp}-${random}`;
}

function saveOrder(orderData) {
  const order = {
    id: generateTicketNumber(),
    ...orderData,
    status: 'new', // new, progress, completed
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
  orders.unshift(order);
  localStorage.setItem('vynex_orders', JSON.stringify(orders));
  return order;
}

function updateOrderStatus(orderId, newStatus) {
  const order = orders.find(o => o.id === orderId);
  if (order) {
    order.status = newStatus;
    order.updatedAt = new Date().toISOString();
    localStorage.setItem('vynex_orders', JSON.stringify(orders));
    loadOrders();
  }
}

function deleteOrder(orderId) {
  if (confirm('Are you sure you want to delete this order?')) {
    orders = orders.filter(o => o.id !== orderId);
    localStorage.setItem('vynex_orders', JSON.stringify(orders));
    loadOrders();
  }
}

function loadOrders() {
  updateStats();
  renderOrders();
}

function updateStats() {
  const newCount = orders.filter(o => o.status === 'new').length;
  const progressCount = orders.filter(o => o.status === 'progress').length;
  const completedCount = orders.filter(o => o.status === 'completed').length;
  
  document.getElementById('statNew').textContent = newCount;
  document.getElementById('statProgress').textContent = progressCount;
  document.getElementById('statCompleted').textContent = completedCount;
  document.getElementById('statTotal').textContent = orders.length;
  
  document.getElementById('tabAll').textContent = orders.length;
  document.getElementById('tabNew').textContent = newCount;
  document.getElementById('tabProgress').textContent = progressCount;
  document.getElementById('tabCompleted').textContent = completedCount;
}

function filterOrders(status) {
  currentFilter = status;
  
  // Update active tab
  document.querySelectorAll('.admin-tab').forEach(tab => {
    tab.classList.remove('active');
  });
  event.target.closest('.admin-tab').classList.add('active');
  
  renderOrders();
}

function searchOrders() {
  renderOrders();
}

function renderOrders() {
  const grid = document.getElementById('ordersGrid');
  const searchTerm = document.getElementById('orderSearch').value.toLowerCase();
  
  let filtered = orders;
  
  // Apply status filter
  if (currentFilter !== 'all') {
    filtered = filtered.filter(o => o.status === currentFilter);
  }
  
  // Apply search filter
  if (searchTerm) {
    filtered = filtered.filter(o => 
      o.id.toLowerCase().includes(searchTerm) ||
      o.name?.toLowerCase().includes(searchTerm) ||
      o.email?.toLowerCase().includes(searchTerm)
    );
  }
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-orders">No orders found</div>';
    return;
  }
  
  grid.innerHTML = filtered.map(order => `
    <div class="order-card ${order.status}">
      <div class="order-header">
        <div class="order-id">${order.id}</div>
        <div class="order-status ${order.status}">
          ${order.status === 'new' ? '🔴 New' : order.status === 'progress' ? '🟡 In Progress' : '🟢 Completed'}
        </div>
      </div>
      <div class="order-details">
        <div class="order-detail">
          <label>Name</label>
          <span>${order.name || 'N/A'}</span>
        </div>
        <div class="order-detail">
          <label>Email</label>
          <span>${order.email || 'N/A'}</span>
        </div>
        <div class="order-detail">
          <label>Country</label>
          <span>${order.country || 'N/A'}</span>
        </div>
        <div class="order-detail">
          <label>Device</label>
          <span>${order.device || 'N/A'}</span>
        </div>
        <div class="order-detail">
          <label>Plan</label>
          <span>${order.planName || 'N/A'}</span>
        </div>
        <div class="order-detail">
          <label>Price</label>
          <span>$${order.price || '0'}</span>
        </div>
        <div class="order-detail">
          <label>Payment</label>
          <span>${order.payment || 'N/A'}</span>
        </div>
        <div class="order-detail">
          <label>Date</label>
          <span>${new Date(order.createdAt).toLocaleString()}</span>
        </div>
      </div>
      <div class="order-actions">
        ${order.status !== 'progress' ? `<button class="order-btn order-btn-progress" onclick="updateOrderStatus('${order.id}', 'progress')">Mark In Progress</button>` : ''}
        ${order.status !== 'completed' ? `<button class="order-btn order-btn-complete" onclick="updateOrderStatus('${order.id}', 'completed')">Mark Completed</button>` : ''}
        ${order.status === 'new' ? `<button class="order-btn order-btn-delete" onclick="deleteOrder('${order.id}')">Delete</button>` : ''}
      </div>
    </div>
  `).join('');
}

// ============================================
// UPDATED ORDER MODAL WITH WHATSAPP
// ============================================

let selectedPayment = '';

function openOrderModal(planId, planNameAr, planNameEn, price) {
  currentPlanId = planId;
  currentPlanLabel = lang === 'ar' ? planNameAr : planNameEn;
  currentPlanPrice = price;
  
  document.getElementById('modalPlanName').textContent = '🛒 ' + currentPlanLabel;
  document.querySelectorAll('#modalOverlay .t').forEach(el => {
    const v = el.getAttribute('data-' + lang);
    if (v) el.textContent = v;
  });
  
  // Reset form
  document.getElementById('f_name').value = '';
  document.getElementById('f_email').value = '';
  document.getElementById('f_country').value = '';
  document.getElementById('f_device').value = '';
  selectedPayment = '';
  
  goStep(1);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// Override goStep3 to include payment and generate ticket
function goStep3() {
  const name = document.getElementById('f_name').value.trim();
  const email = document.getElementById('f_email').value.trim();
  const country = document.getElementById('f_country').value.trim();
  const device = document.getElementById('f_device').value.trim();
  
  if (!name || !email) {
    alert(lang === 'ar' ? 'الاسم والبريد مطلوبان' : 'Name and Email are required');
    return;
  }
  
  if (!selectedPayment) {
    alert(lang === 'ar' ? 'اختر طريقة الدفع' : 'Please select payment method');
    return;
  }
  
  // Save order to localStorage
  const orderData = {
    plan: currentPlanId,
    planName: currentPlanLabel,
    price: currentPlanPrice,
    name: name,
    email: email,
    country: country,
    device: device,
    payment: selectedPayment,
    lang: lang
  };
  
  const savedOrder = saveOrder(orderData);
  
  // Generate WhatsApp message
  const message = encodeURIComponent(
    `*🆕 NEW ORDER - VYNEX IPTV*\n\n` +
    `🎫 *Ticket:* ${savedOrder.id}\n` +
    `👤 *Name:* ${name}\n` +
    `📧 *Email:* ${email}\n` +
    `🌍 *Country:* ${country || 'N/A'}\n` +
    `📱 *Device:* ${device || 'N/A'}\n` +
    `📦 *Plan:* ${currentPlanLabel}\n` +
    `💰 *Price:* $${currentPlanPrice}\n` +
    `💳 *Payment:* ${selectedPayment}\n` +
    `⏰ *Time:* ${new Date().toLocaleString()}\n\n` +
    `Please confirm and proceed with payment.`
  );
  
  const whatsappLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
  document.getElementById('finalWhatsAppLink').href = whatsappLink;
  
  // Show summary
  const box = document.getElementById('orderSummaryBox');
  box.innerHTML = `
    <div class="ticket-number">${savedOrder.id}</div>
    <div class="order-summary">
      <div class="summary-row">
        <span class="summary-label">Plan</span>
        <span class="summary-value">${currentPlanLabel}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Price</span>
        <span class="summary-value">$${currentPlanPrice}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Name</span>
        <span class="summary-value">${name}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Email</span>
        <span class="summary-value">${email}</span>
      </div>
      ${country ? `
      <div class="summary-row">
        <span class="summary-label">Country</span>
        <span class="summary-value">${country}</span>
      </div>` : ''}
      <div class="summary-row">
        <span class="summary-label">Payment</span>
        <span class="summary-value">${selectedPayment}</span>
      </div>
    </div>
  `;
  
  goStep(3);
}

// Payment selection
function selectPayment(method) {
  selectedPayment = method;
  document.querySelectorAll('.payment-option').forEach(opt => {
    opt.classList.remove('selected');
  });
  event.currentTarget.classList.add('selected');
}

// Update modal HTML to include payment step
document.addEventListener('DOMContentLoaded', function() {
  // Replace step 2 content with payment selection
  const step2 = document.getElementById('step2');
  step2.innerHTML = `
    <h2 class="modal-title t" data-ar="بيانات الطلب" data-en="Order Details">Order Details</h2>
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:1rem;">Enter your details and select payment method</p>
    
    <label class="form-label">Full Name *</label>
    <input class="order-form-field" id="f_name" type="text" placeholder="John Doe">
    
    <label class="form-label">Email *</label>
    <input class="order-form-field" id="f_email" type="email" placeholder="example@gmail.com">
    
    <label class="form-label">Country</label>
    <input class="order-form-field" id="f_country" type="text" placeholder="Algeria">
    
    <label class="form-label">Device Type</label>
    <input class="order-form-field" id="f_device" type="text" placeholder="Android TV, Smart TV, iPhone...">
    
    <label class="form-label">Payment Method *</label>
    <div class="payment-grid">
      <div class="payment-option" onclick="selectPayment('RedotPay')">
        <i class="fas fa-wallet" style="color:#ff6b6b;"></i>
        <span>RedotPay</span>
      </div>
      <div class="payment-option" onclick="selectPayment('PayPal')">
        <i class="fab fa-paypal" style="color:#0070ba;"></i>
        <span>PayPal</span>
      </div>
      <div class="payment-option" onclick="selectPayment('Binance USDT')">
        <i class="fas fa-coins" style="color:#f0b90b;"></i>
        <span>Binance USDT</span>
      </div>
      <div class="payment-option" onclick="selectPayment('CCP Algeria')">
        <i class="fas fa-university" style="color:#00a8e8;"></i>
        <span>CCP Algeria</span>
      </div>
    </div>
    
    <button class="modal-cta" onclick="goStep3()">
      <i class="fab fa-whatsapp"></i>
      <span>Send via WhatsApp</span>
    </button>
    <button class="modal-cta-outline" onclick="goStep(1)">
      <span>🔙 Back</span>
    </button>
  `;
  
  // Update step 3 to show WhatsApp button
  const step3 = document.getElementById('step3');
  step3.innerHTML = `
    <h2 class="modal-title" style="color:var(--green)">✅ Order Ready!</h2>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:.8rem;">Your order has been saved. Click below to send via WhatsApp:</p>
    
    <div class="copy-box" id="orderSummaryBox"></div>
    
    <a id="finalWhatsAppLink" href="#" target="_blank" class="modal-cta modal-cta-whatsapp" onclick="closeModal()">
      <i class="fab fa-whatsapp"></i>
      <span>Open WhatsApp & Send Order</span>
    </a>
    
    <button class="modal-cta-outline" onclick="goStep(2)">
      <span>✏️ Edit Details</span>
    </button>
    
    <p style="font-size:.75rem;color:var(--muted);margin-top:1rem;text-align:center;">
      <i class="fas fa-info-circle"></i> 
      Save your ticket number for reference
    </p>
  `;
});
</script>
